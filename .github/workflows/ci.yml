# Runs on every push to main and on pull requests.
# (GitHub release packaging is separate: see release.yml — tag push v* only.)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ephemeral/ink_ui/package-lock.json

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install Ink UI dependencies
        run: npm ci --prefix ephemeral/ink_ui

      - name: Lint
        run: uv run ruff check ephemeral tests

      - name: Compile smoke test
        run: uv run python -m compileall ephemeral tests

      - name: Ink typecheck
        run: npm --prefix ephemeral/ink_ui run typecheck

      - name: Ink smoke test
        run: npm --prefix ephemeral/ink_ui run smoke

      - name: Run tests
        run: uv run pytest tests/ -q --tb=short
