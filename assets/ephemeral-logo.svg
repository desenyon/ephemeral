      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 0.45 0 0 0.55 0 0 0.15 0 0 0 0 0 0.8 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1040" height="360" rx="34" fill="#030303"/>
