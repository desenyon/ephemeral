<svg width="1040" height="360" viewBox="0 0 1040 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ephemeral Research Desk</title>
  <desc id="desc">A terminal-native research desk logo with market rails, command panels, and an E monogram.</desc>
  <defs>
    <linearGradient id="panel" x1="120" y1="42" x2="908" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121212"/>
      <stop offset="0.5" stop-color="#050505"/>
      <stop offset="1" stop-color="#15100A"/>
    </linearGradient>
    <linearGradient id="amber" x1="162" y1="64" x2="838" y2="293" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB000"/>
